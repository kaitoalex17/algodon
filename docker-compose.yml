version: '3.8'

services:
  db:
    image: kartoza/postgis:15-3.4
    container_name: algodon-db
    environment:
      POSTGRES_DBNAME: algodon
      POSTGRES_USER: postgres
      POSTGRES_PASS: postgres
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algodon-backend
    ports:
      - "18080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/algodon
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algodon-frontend
    ports:
      - "18081:80"
    depends_on:
      - backend

volumes:
  pgdata:
